    <style>
      /* ─────────────────────────────────────────
         LOGIN OVERLAY  (black + light red theme)
         inherits font-family from style.css
      ───────────────────────────────────────── */
      #loginOverlay {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #loginOverlay.hidden {
        display: none;
      }

      /* soft red glow blobs */
      #loginOverlay::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(ellipse at 25% 55%, rgba(200, 30, 30, 0.1) 0%, transparent 55%),
          radial-gradient(ellipse at 80% 25%, rgba(180, 20, 20, 0.07) 0%, transparent 50%);
      }

      /* faint red grid */
      #loginOverlay::after {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(160, 0, 0, 0.045) 1px, transparent 1px),
          linear-gradient(90deg, rgba(160, 0, 0, 0.045) 1px, transparent 1px);
        background-size: 50px 50px;
      }

      .login-card {
        position: relative;
        z-index: 2;
        width: 100%;
        max-width: 400px;
        margin: 20px;
        background: #0c0c0c;
        border: 1px solid #1e0808;
        border-radius: 14px;
        padding: 38px 34px;
        box-shadow:
          0 0 0 1px rgba(180, 20, 20, 0.07),
          0 28px 70px rgba(0, 0, 0, 0.75),
          inset 0 1px 0 rgba(255, 50, 50, 0.05);
        opacity: 0;
        transform: translateY(22px);
        animation: loginCardIn 0.55s cubic-bezier(0.22, 1, 0.36, 1) 0.05s forwards;
      }

      /* top red accent line */
      .login-card::before {
        content: '';
        position: absolute;
        top: 0; left: 10%; right: 10%;
        height: 1.5px;
        border-radius: 99px;
        background: linear-gradient(90deg, transparent, #c41e1e 40%, #e84040 60%, #c41e1e, transparent);
      }

      @keyframes loginCardIn {
        to { opacity: 1; transform: translateY(0); }
      }

      .login-site-name {
        text-align: center;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 3.5px;
        text-transform: uppercase;
        color: #b01818;
        margin-bottom: 8px;
      }

      .login-heading {
        text-align: center;
        font-size: 1.45rem;
        font-weight: 900;
        color: #fff;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 3px;
      }

      .login-tagline {
        text-align: center;
        font-size: 0.78rem;
        color: #444;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 30px;
      }

      /* error banner */
      .login-error {
        display: none;
        align-items: center;
        gap: 8px;
        background: rgba(180, 20, 20, 0.12);
        border: 1px solid rgba(180, 20, 20, 0.35);
        border-radius: 8px;
        padding: 9px 13px;
        font-size: 0.85rem;
        color: #e05555;
        margin-bottom: 18px;
      }

      .login-error.show {
        display: flex;
        animation: errShake 0.38s ease;
      }

      @keyframes errShake {
        0%,100%{ transform: translateX(0); }
        20%,60%{ transform: translateX(-5px); }
        40%,80%{ transform: translateX(5px); }
      }

      /* fields */
      .login-field { margin-bottom: 17px; }

      .login-field label {
        display: block;
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 2.5px;
        text-transform: uppercase;
        color: #4a4a4a;
        margin-bottom: 7px;
      }

      .login-input-wrap { position: relative; }

      .login-input-wrap .l-icon {
        position: absolute;
        left: 13px;
        top: 50%;
        transform: translateY(-50%);
        color: #333;
        pointer-events: none;
        transition: color 0.2s;
      }

      .login-input-wrap input:focus ~ .l-icon {
        color: #cc2222;
      }

      .login-input-wrap input {
        width: 100%;
        background: #111;
        border: 1px solid #1f1f1f;
        border-radius: 8px;
        padding: 11px 42px;
        color: #ddd;
        font-family: inherit;
        font-size: 0.96rem;
        font-weight: 600;
        letter-spacing: 0.4px;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      }

      .login-input-wrap input::placeholder { color: #2e2e2e; }

      .login-input-wrap input:focus {
        border-color: #aa1a1a;
        background: #120808;
        box-shadow: 0 0 0 3px rgba(180, 20, 20, 0.14);
      }

      .pass-eye {
        position: absolute;
        right: 11px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: #333;
        padding: 4px;
        display: flex;
        align-items: center;
        transition: color 0.2s;
      }

      .pass-eye:hover { color: #cc2222; }

      /* submit button */
      .login-btn {
        width: 100%;
        padding: 12.5px;
        background: #be1b1b;
        border: none;
        border-radius: 8px;
        color: #fff;
        font-family: inherit;
        font-size: 0.8rem;
        font-weight: 800;
        letter-spacing: 3px;
        text-transform: uppercase;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition: background 0.18s, transform 0.12s, box-shadow 0.18s;
        box-shadow: 0 4px 18px rgba(160, 20, 20, 0.45);
      }

      .login-btn::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(255,255,255,0.09) 0%, transparent 100%);
        pointer-events: none;
      }

      .login-btn:hover {
        background: #d42020;
        transform: translateY(-1px);
        box-shadow: 0 7px 22px rgba(190, 27, 27, 0.55);
      }

      .login-btn:active { transform: translateY(0); }

      .login-btn.loading { pointer-events: none; opacity: 0.6; }

      .login-btn.success {
        background: #166b34;
        box-shadow: 0 4px 18px rgba(20, 140, 60, 0.4);
        pointer-events: none;
      }

      .l-spinner {
        display: inline-block;
        width: 13px;
        height: 13px;
        border: 2px solid rgba(255,255,255,0.25);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.55s linear infinite;
        vertical-align: middle;
        margin-right: 7px;
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      .login-divider {
        height: 1px;
        background: #161616;
        margin: 24px 0;
      }

      .login-hint {
        text-align: center;
        font-size: 0.78rem;
        color: #3e3e3e;
        letter-spacing: 0.3px;
      }

      .login-hint span { color: #cc2222; font-weight: 700; }

      /* ─────────────────────────────────────────
         MAIN SITE  (hidden until auth passes)
      ───────────────────────────────────────── */
      #mainSite { display: none; }
      #mainSite.visible { display: block; }
    </style>

  <body class="dark-mode">

    <!-- ══════════════════════════════════════

    <div id="loginOverlay">

            <svg class="l-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>

        </div>

          <label for="loginPass">Password</label>
          <div class="login-input-wrap">

            <svg class="l-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>

        <button class="login-btn" id="loginSubmit" onclick="doLogin()" type="button">

        <div class="login-divider"></div>
        <div class="login-hint">No account? Give <span>Finny $2.50</span> to get one.</div>

      </div>
    </div>

    <!-- ══════════════════════════════════════
         FIREBASE  (shared IP lock + log)
         Replace the config below with YOUR
         Firebase project's config.
    ══════════════════════════════════════ -->
    <script type="module">
      import { initializeApp }                          from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
      import { getFirestore, doc, getDoc, setDoc, updateDoc, arrayUnion }
                                                        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      // ── PASTE YOUR FIREBASE CONFIG HERE ──────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyBSRB_H3x9EcJGCBTI5JRkZSfJiUDW6O9E",
  authDomain:        "finnyprivatesite.firebaseapp.com",
  projectId:         "finnyprivatesite",
  storageBucket:     "finnyprivatesite.firebasestorage.app",
  messagingSenderId: "575839701505",
  appId:             "1:575839701505:web:5946712828b951c4fc8e00"
};
      // ─────────────────────────────────────────────────────────────

      // ── ACCOUNTS ─────────────────────────────────────────────────
      const ACCOUNTS = [
        { username: "FMC",    password: "finneganaccount" },
        { username: "OML",    password: "odieaccount"     },
        { username: "MRY",    password: "michaelaccount"  },
        { username: "JMS",    password: "jeremieaccount"  },
        { username: "FLE",    password: "finnainaccount"  },
        { username: "JAL",    password: "josiahaccount"   },
        { username: "DEP",    password: "devinaccount"    },
        { username: "BR",     password: "bradyaccount"    },
        { username: "LRB",    password: "leoaccount"      },
        { username: "Carter", password: "carteraccount"   },
        // { username: "newuser", password: "theirpass" },
      ];
      // ─────────────────────────────────────────────────────────────

      const SESSION_KEY = "finny_auth";

      const app = initializeApp(firebaseConfig);
      const db  = getFirestore(app);

      // ── helpers ──────────────────────────────────────────────────

      async function fetchIp() {
        try {
          const r = await fetch("https://api.ipify.org?format=json");
          const d = await r.json();
          return d.ip;
        } catch(_) {
          try {
            const r = await fetch("https://api64.ipify.org?format=json");
            const d = await r.json();
            return d.ip;
          } catch(_) { return "unknown"; }
        }
      }

      function revealSite() {
        document.getElementById("loginOverlay").classList.add("hidden");
        document.getElementById("mainSite").classList.add("visible");
        window.addEventListener('beforeunload', function(e) {
          e.preventDefault();
          e.returnValue = '';
          return 'Are you sure you want to leave? Any unsaved changes will be lost.';
        });
      }

      function showLoginError(msg) {
        const errBox = document.getElementById("loginError");
        document.getElementById("loginErrorText").textContent = msg;
        errBox.classList.remove("show");
        void errBox.offsetWidth;
        errBox.classList.add("show");
      }

      function resetBtn() {
        const btn = document.getElementById("loginSubmit");
        btn.classList.remove("loading");
        btn.innerHTML = "Enter Site";
      }

      // ── skip login if already authed this session ────────────────
      if (sessionStorage.getItem(SESSION_KEY) === "ok") {
        revealSite();
      }

      // ── main login function ──────────────────────────────────────
      window.doLogin = async function() {
        const username = document.getElementById("loginUser").value.trim();
        const password = document.getElementById("loginPass").value;
        const btn      = document.getElementById("loginSubmit");
        const errBox   = document.getElementById("loginError");

        if (!username || !password) {
          showLoginError("Please fill in both fields.");
          return;
        }

        btn.classList.add("loading");
        btn.innerHTML = '<span class="l-spinner"></span>Checking...';
        errBox.classList.remove("show");

        // Step 1: check credentials
        const match = ACCOUNTS.find(
          a => a.username.toLowerCase() === username.toLowerCase() && a.password === password
        );

        if (!match) {
          resetBtn();
          showLoginError("Wrong username or password.");
          return;
        }

        // Step 2: fetch IP
        btn.innerHTML = '<span class="l-spinner"></span>Verifying...';
        const ip = await fetchIp();
        const now = new Date().toISOString();
        const canonUser = match.username.toLowerCase();

        try {
          // Step 3: check Firestore for this account's locked IP
          const lockRef  = doc(db, "ip_locks", canonUser);
          const lockSnap = await getDoc(lockRef);

          let allowed = false;
          let reason  = "";
          let lockedIp = null;

          if (!lockSnap.exists()) {
            // First ever login — register this IP as the locked one
            await setDoc(lockRef, { lockedIp: ip, registeredAt: now });
            allowed  = true;
            reason   = "first_login_ip_registered";
            lockedIp = ip;
          } else {
            lockedIp = lockSnap.data().lockedIp;
            if (ip === "unknown" || lockedIp === ip) {
              allowed = true;
              reason  = ip === "unknown" ? "ip_unknown_allowed" : "ip_match";
            } else {
              allowed = false;
              reason  = "ip_mismatch";
            }
          }

          // Step 4: write log entry to Firestore
          const logRef = doc(db, "ip_log", canonUser);
          const logEntry = { username: match.username, ip, time: now, allowed, reason, lockedIp };
          const logSnap = await getDoc(logRef);
          if (logSnap.exists()) {
            await updateDoc(logRef, { entries: arrayUnion(logEntry) });
          } else {
            await setDoc(logRef, { entries: [logEntry] });
          }

          // Step 5: grant or deny
          if (allowed) {
            sessionStorage.setItem(SESSION_KEY, "ok");
            btn.classList.remove("loading");
            btn.classList.add("success");
            btn.innerHTML = "✓ Access Granted";
            setTimeout(revealSite, 480);
          } else {
            resetBtn();
            showLoginError("Access denied: this account is locked to a different device.");
          }

        } catch (err) {
          console.error("Firebase error:", err);
          resetBtn();
          showLoginError("Connection error — please try again.");
        }
      };

      // ── password toggle ──────────────────────────────────────────
      window.toggleLoginPass = function() {
        const inp  = document.getElementById("loginPass");
        const icon = document.getElementById("loginEyeIcon");
        if (inp.type === "password") {
          inp.type = "text";
          icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
        } else {
          inp.type = "password";
          icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
        }
      };

      // Enter key
      document.addEventListener("keydown", function(e) {
        if (e.key === "Enter" && !document.getElementById("loginOverlay").classList.contains("hidden")) {
          window.doLogin();
        }
      });

      // ── HOW TO RESET AN IP LOCK ───────────────────────────────────
      // Go to console.firebase.google.com → your project →
      // Firestore Database → "ip_locks" collection →
      // find the document named after the username (lowercase) →
      // delete it. That person can then log in fresh from any IP.
      //
      // To view login history:
      // Firestore → "ip_log" collection → click any username document.
      // ─────────────────────────────────────────────────────────────
    </script>
